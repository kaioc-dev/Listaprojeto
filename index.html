<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartList Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="app-container">
        <header class="header">
            <div class="title-area">
                <h1>SmartList</h1>
                <p>Organize suas compras com estilo</p>
            </div>
            <div class="stats-badge">
                <span id="item-count">0</span>
            </div>
        </header>

        <section class="input-section">
            <div class="glass-card input-group">
                <input type="text" id="item-input" placeholder="O que vamos comprar hoje?" autocomplete="off">
                <button id="add-btn">
                    <span>Adicionar</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </section>

        <section class="list-container">
            <div id="empty-state" class="empty-state">
                <div class="icon-circle">🛒</div>
                <p>Sua lista está pronta para ser preenchida!</p>
            </div>
            
            <ul id="shopping-list" class="item-list"></ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
