<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartList Pro | Kaio César</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-card">
        <div id="home-screen">
            <header>
                <div class="logo">
                    <h1>Smart<span class="highlight">Hub</span></h1>
                    <p>Suas Listas Inteligentes</p>
                </div>
            </header>
            
            <div class="dashboard-actions">
                <button id="create-list-btn" class="main-action-btn">
                    <i class="fas fa-plus-circle"></i> Criar Nova Lista
                </button>
            </div>

            <div id="lists-grid" class="lists-grid">
                </div>
        </div>

        <div id="list-detail-screen" style="display: none;">
            <header>
                <div class="header-top">
                    <button id="back-btn" class="btn-icon"><i class="fas fa-arrow-left"></i></button>
                    <div class="logo">
                        <h2 id="current-list-title">Lista</h2>
                        <p id="current-date"></p>
                    </div>
                    <div class="header-actions">
                        <button id="share-btn" class="btn-share"><i class="fab fa-whatsapp"></i></button>
                        <button id="clear-all" class="btn-clear"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            </header>

            <div class="input-group">
                <input type="text" id="item-input" placeholder="Adicionar item..." autocomplete="off">
                <input type="date" id="date-input">
                <button type="button" id="add-btn"><i class="fas fa-plus"></i></button>
            </div>

            <div class="list-container">
                <ul id="shopping-list-ul"></ul>
            </div>

            <div class="footer-actions">
                <button id="save-btn" class="btn-save-premium">
                    <span class="btn-text">Salvar Alterações</span>
                    <span class="btn-glow"></span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
