<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartList | Clean</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container">
        <header class="header">
            <h1>Minha Lista</h1>
            <span id="item-count">0 itens</span>
        </header>

        <section class="input-section">
            <div class="input-wrapper">
                <input type="text" id="item-input" placeholder="Adicionar item..." autocomplete="off">
                <button id="add-btn" aria-label="Adicionar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </section>

        <section class="list-section">
            <ul id="shopping-list">
                </ul>
            
            <div id="empty-state" class="empty-state">
                <p>Sua lista está limpa.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
